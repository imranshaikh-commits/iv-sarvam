# =====================================================
# SARVAM — Hermes Agent Configuration
# =====================================================
# This file is mounted read-only into the Hermes container.
# Loaded at container startup. Edit and restart to apply.

model:
  provider: openrouter
  default: deepseek/deepseek-v4-flash
  fallback_chain:
    - deepseek/deepseek-v4-flash
    - z-ai/glm-5.2
    - anthropic/claude-sonnet-4.6
  # When a section is compliance/pricing-sensitive, force escalation
  escalation:
    triggers:
      - compliance_section
      - pricing_section
      - final_polish
    model: anthropic/claude-sonnet-4.6

# System prompt (loaded from persona spec)
# Full prompt in docs/SARVAM_PERSONA.md section 7
system_prompt_file: /root/.hermes/prompts/sarvam.txt

# Skills loaded on startup
skills:
  - name: claude_mem
    enabled: true
    config:
      storage_backend: sqlite
      compression: true
  - name: retrieve_similar_proposals
    enabled: true
    config:
      supabase_url: ${SUPABASE_URL}
      supabase_key: ${SUPABASE_SERVICE_ROLE_KEY}
      min_similarity: 0.75
      top_k: 5
  - name: crawl_prospect
    enabled: true
    config:
      max_pages: 10
      timeout_seconds: 30
  - name: propose_architecture
    enabled: true
  - name: draft_proposal_section
    enabled: true
  - name: assemble_and_export
    enabled: true

# Retry & error handling
retry:
  max_attempts: 2
  backoff_seconds: [1, 3]

# Rate limiting (protects OpenRouter costs)
rate_limit:
  requests_per_minute: 60
  tokens_per_minute: 100000
