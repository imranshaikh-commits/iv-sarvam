# =====================================================
# SARVAM — Production stack
# =====================================================
# Runs on EC2 sarvam-server (13.206.20.25).
# Usage:  cd ~/iv-sarvam/deploy && docker compose up -d --build
#
# open-webui volume is the PRE-EXISTING named volume from Day 1
# (declared external) — admin accounts, chats, branding preserved.
#
# sarvam-brain (Sprint 4): OpenAI-compatible grounded drafting service.
# NOT exposed publicly — Open WebUI reaches it at http://sarvam-brain:8000/v1
# on the compose network; host port bound to 127.0.0.1 for local testing only.

name: sarvam

services:
  open-webui:
    # Thin custom image (deploy/Dockerfile.webui) that strips Open WebUI's
    # forced " (Open WebUI)" brand suffix so WEBUI_NAME shows cleanly.
    build:
      context: .
      dockerfile: Dockerfile.webui
    container_name: sarvam-webui
    restart: always
    # Branding — persistent across rebuilds (was lost in the Sprint 3
    # docker-run -> compose migration because it was only a runtime env var).
    environment:
      - "WEBUI_NAME=Sarvam AI - Inspirit Vision Proposal Architect"
    ports:
      - "8080:8080"
    volumes:
      - open-webui:/app/backend/data

  sarvam-brain:
    build: ../backend/brain
    container_name: sarvam-brain
    restart: always
    env_file:
      - ../scripts/sarvam.env
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  open-webui:
    external: true
    name: open-webui
